name: Build Kernel with SukiSU-Ultra

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "Kernel source repository URL"
        required: true
        default: "https://github.com/PixelExperience-Devices/kernel_xiaomi_lisa"
      KERNEL_BRANCH:
        description: "Kernel source branch"
        required: true
        default: "thirteen"
      KERNEL_DEFCONFIG:
        description: "Defconfig file"
        required: true
        default: "lisa_defconfig"
      SUKISU_BRANCH:
        description: "SukiSU-Ultra branch"
        required: true
        default: "main"
      HOOK_METHOD:
        description: "Hook method"
        required: true
        default: "manual"
        type: choice
        options:
          - kprobe
          - manual
      ENABLE_KPM:
        description: "Enable KPM (Kernel Patch Module)"
        required: false
        default: "true"
        type: boolean
      DISABLE_LTO:
        description: "Disable LTO"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ════════════════════════════════════════════════════════
      # Step 1: Install Build Dependencies
      # ════════════════════════════════════════════════════════
      - name: Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libncurses-dev \
            zip \
            unzip \
            curl \
            wget \
            git \
            python3 \
            python-is-python3 \
            cpio \
            kmod \
            lld \
            llvm
          echo "✅ Build dependencies installed"

      # ════════════════════════════════════════════════════════
      # Step 2: Clone Kernel Source
      # ════════════════════════════════════════════════════════
      - name: Clone Kernel Source
        run: |
          echo "══════ Cloning kernel source ══════"
          git clone --depth=1 \
            -b ${{ github.event.inputs.KERNEL_BRANCH }} \
            ${{ github.event.inputs.KERNEL_SOURCE }} \
            $GITHUB_WORKSPACE/kernel_source
          echo "✅ Kernel source cloned"
          ls -la $GITHUB_WORKSPACE/kernel_source/

      # ════════════════════════════════════════════════════════
      # Step 3: Clone Clang Toolchain (ZyCromerZ Clang 21)
      # ════════════════════════════════════════════════════════
      - name: Clone Clang Toolchain
        run: |
          echo "══════ Downloading Clang toolchain ══════"
          mkdir -p $GITHUB_WORKSPACE/clang

          # Get latest release tag from ZyCromerZ/Clang
          CLANG_URL=$(curl -sL https://api.github.com/repos/ZyCromerZ/Clang/releases/latest \
            | grep "browser_download_url" \
            | grep "Clang-.*\.tar\.gz" \
            | head -1 \
            | cut -d '"' -f 4)

          if [ -z "$CLANG_URL" ]; then
            echo "⚠️ Failed to get latest release, using fallback..."
            CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/21.0.0-20250601-release/Clang-21.0.0-20250601.tar.gz"
          fi

          echo "Downloading: $CLANG_URL"
          wget -q "$CLANG_URL" -O clang.tar.gz
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang/
          rm -f clang.tar.gz

          # Verify
          $GITHUB_WORKSPACE/clang/bin/clang --version
          echo "✅ Clang toolchain ready"

      # ════════════════════════════════════════════════════════
      # Step 4: Clone GCC Toolchains (aarch64 & arm)
      # ════════════════════════════════════════════════════════
      - name: Clone GCC aarch64 Toolchain
        run: |
          echo "══════ Cloning GCC aarch64 ══════"
          git clone --depth=1 \
            https://github.com/AliGH3A/aarch64-linux-android-4.9 \
            $GITHUB_WORKSPACE/gcc-aarch64
          echo "✅ GCC aarch64 toolchain ready"

      - name: Clone GCC arm Toolchain
        run: |
          echo "══════ Cloning GCC arm ══════"
          git clone --depth=1 \
            https://github.com/AliGH3A/arm-linux-androideabi-4.9 \
            $GITHUB_WORKSPACE/gcc-arm
          echo "✅ GCC arm toolchain ready"

      # ════════════════════════════════════════════════════════
      # Step 5: Clone & Integrate SukiSU-Ultra
      # ════════════════════════════════════════════════════════
      - name: Clone & Integrate SukiSU-Ultra
        run: |
          echo "══════ Cloning SukiSU-Ultra ══════"
          cd $GITHUB_WORKSPACE/kernel_source

          # Clone SukiSU-Ultra
          git clone --depth=1 \
            -b ${{ github.event.inputs.SUKISU_BRANCH }} \
            https://github.com/ShirkNeko/SukiSU-Ultra.git \
            $GITHUB_WORKSPACE/SukiSU-Ultra

          echo "✅ SukiSU-Ultra cloned"

          # ── Create KernelSU symlink in drivers ──
          ln -sf $GITHUB_WORKSPACE/SukiSU-Ultra/kernel drivers/kernelsu
          echo "✅ KernelSU symlink created: drivers/kernelsu"

          # ── Patch drivers/Makefile ──
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
            echo "✅ drivers/Makefile patched"
          else
            echo "⏭️ drivers/Makefile already patched"
          fi

          # ── Patch drivers/Kconfig ──
          if ! grep -q "kernelsu" drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            echo "✅ drivers/Kconfig patched"
          else
            echo "⏭️ drivers/Kconfig already patched"
          fi

          # ── Enable KSU in defconfig ──
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.KERNEL_DEFCONFIG }}"
          if [ -f "$DEFCONFIG_PATH" ]; then
            echo "CONFIG_KSU=y" >> "$DEFCONFIG_PATH"
            echo "✅ CONFIG_KSU=y added to defconfig"
          else
            echo "❌ ERROR: Defconfig not found at $DEFCONFIG_PATH"
            exit 1
          fi

          # ════════════════════════════════════════
          # Hook Method: Manual or KProbe
          # ════════════════════════════════════════
          HOOK_METHOD="${{ github.event.inputs.HOOK_METHOD }}"
          echo "Hook method selected: $HOOK_METHOD"

          if [ "$HOOK_METHOD" = "manual" ]; then
            echo "══════ Applying manual hook patches (Linux 5.4) ══════"

            # ── Patch fs/open.c (do_faccessat) ──
            if [ -f fs/open.c ]; then
              sed -i '/^long do_faccessat/,/^{/ {
                /^{/a\
                \tksu_handle_faccessat(&mode, &dfd);
              }' fs/open.c

              # Add include at top
              if ! grep -q "linux/ksu.h" fs/open.c; then
                sed -i '1i #include <linux/ksu.h>' fs/open.c
              fi
              echo "✅ fs/open.c patched (do_faccessat)"
            fi

            # ── Patch fs/exec.c (__do_execve) ──
            if [ -f fs/exec.c ]; then
              sed -i '/static int __do_execve/,/^{/ {
                /^{/a\
                \tksu_handle_execve(bprm->filename, NULL, NULL, NULL, NULL);
              }' fs/exec.c

              if ! grep -q "linux/ksu.h" fs/exec.c; then
                sed -i '1i #include <linux/ksu.h>' fs/exec.c
              fi
              echo "✅ fs/exec.c patched (__do_execve)"
            fi

            # ── Patch fs/read_write.c (vfs_read) ──
            if [ -f fs/read_write.c ]; then
              sed -i '/^ssize_t vfs_read/,/^{/ {
                /^{/a\
                \tksu_handle_vfs_read(&file);
              }' fs/read_write.c

              if ! grep -q "linux/ksu.h" fs/read_write.c; then
                sed -i '1i #include <linux/ksu.h>' fs/read_write.c
              fi
              echo "✅ fs/read_write.c patched (vfs_read)"
            fi

            # ── Patch fs/stat.c (vfs_statx) ──
            if [ -f fs/stat.c ]; then
              sed -i '/int vfs_statx/,/^{/ {
                /^{/a\
                \tksu_handle_stat(&dfd, &filename, &flags);
              }' fs/stat.c

              if ! grep -q "linux/ksu.h" fs/stat.c; then
                sed -i '1i #include <linux/ksu.h>' fs/stat.c
              fi
              echo "✅ fs/stat.c patched (vfs_statx)"
            fi

            # ── Patch drivers/input/input.c (input_handle_event) ──
            if [ -f drivers/input/input.c ]; then
              sed -i '/static void input_handle_event/,/^{/ {
                /^{/a\
                \tksu_handle_input_handle_event(&type, &code, &value);
              }' drivers/input/input.c

              if ! grep -q "linux/ksu.h" drivers/input/input.c; then
                sed -i '1i #include <linux/ksu.h>' drivers/input/input.c
              fi
              echo "✅ drivers/input/input.c patched (input_handle_event)"
            fi

            echo "✅ All manual hook patches applied"

          elif [ "$HOOK_METHOD" = "kprobe" ]; then
            echo "══════ Enabling KProbe hook ══════"
            echo "CONFIG_KPROBES=y" >> "$DEFCONFIG_PATH"
            echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG_PATH"
            echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG_PATH"
            echo "✅ KProbe configs added to defconfig"
          fi

          echo "✅ SukiSU-Ultra integration complete"

      # ════════════════════════════════════════════════════════
      # Step 6: Enable KPM Support (if selected)
      # ════════════════════════════════════════════════════════
      - name: Enable KPM Support
        if: github.event.inputs.ENABLE_KPM == 'true'
        run: |
          echo "══════ Enabling KPM ══════"
          cd $GITHUB_WORKSPACE/kernel_source
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.KERNEL_DEFCONFIG }}"

          echo "CONFIG_KPM=y" >> "$DEFCONFIG_PATH"
          echo "✅ CONFIG_KPM=y added to defconfig"

      # ════════════════════════════════════════════════════════
      # Step 7: Disable LTO (if selected)
      # ════════════════════════════════════════════════════════
      - name: Disable LTO
        if: github.event.inputs.DISABLE_LTO == 'true'
        run: |
          echo "══════ Disabling LTO ══════"
          cd $GITHUB_WORKSPACE/kernel_source
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.KERNEL_DEFCONFIG }}"

          # Remove existing LTO configs
          sed -i '/CONFIG_LTO_CLANG=y/d' "$DEFCONFIG_PATH"
          sed -i '/CONFIG_LTO_CLANG_THIN=y/d' "$DEFCONFIG_PATH"
          sed -i '/CONFIG_LTO_CLANG_FULL=y/d' "$DEFCONFIG_PATH"
          sed -i '/CONFIG_THINLTO=y/d' "$DEFCONFIG_PATH"

          # Set LTO to none
          echo "CONFIG_LTO_NONE=y" >> "$DEFCONFIG_PATH"
          echo "# CONFIG_LTO_CLANG is not set" >> "$DEFCONFIG_PATH"
          echo "# CONFIG_LTO_CLANG_THIN is not set" >> "$DEFCONFIG_PATH"
          echo "# CONFIG_LTO_CLANG_FULL is not set" >> "$DEFCONFIG_PATH"

          echo "✅ LTO disabled in defconfig"

      # ════════════════════════════════════════════════════════
      # Step 8: Build Kernel & Export ZIP via build.sh
      # ════════════════════════════════════════════════════════
      - name: Build Kernel & Export ZIP via build.sh
        run: |
          cd $GITHUB_WORKSPACE/kernel_source

          # ── Generate build.sh ──
          cat > build.sh << 'BUILDEOF'
          #!/bin/bash
          set -euo pipefail

          # ═══════════════════════════════════════
          #  ENVIRONMENT SETUP
          # ═══════════════════════════════════════
          export ARCH=arm64
          export SUBARCH=arm64
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t

          CLANG_DIR="$GITHUB_WORKSPACE/clang"
          GCC_AARCH64="$GITHUB_WORKSPACE/gcc-aarch64"
          GCC_ARM="$GITHUB_WORKSPACE/gcc-arm"

          export PATH="$CLANG_DIR/bin:$GCC_AARCH64/bin:$GCC_ARM/bin:$PATH"

          KERNEL_DIR="$(pwd)"
          OUT_DIR="$KERNEL_DIR/out"
          ZIP_DIR="$KERNEL_DIR/zip_export"
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          ZIP_NAME="Kernel-SukiSU-lisa-${TIMESTAMP}.zip"

          MAKE_ARGS=(
            -j$(nproc --all)
            O="$OUT_DIR"
            ARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_COMPAT=arm-linux-androideabi-
            LLVM=1
            LLVM_IAS=1
          )

          # ═══════════════════════════════════════
          #  COMPILE: Generate defconfig
          # ═══════════════════════════════════════
          echo "══════ Generating defconfig ══════"
          DEFCONFIG="${DEFCONFIG_INPUT}"
          make "${MAKE_ARGS[@]}" "$DEFCONFIG"
          echo "✅ Defconfig generated"

          # ═══════════════════════════════════════
          #  COMPILE: Build kernel
          # ═══════════════════════════════════════
          echo "══════ Building kernel... ══════"
          make "${MAKE_ARGS[@]}"
          echo "✅ Kernel build completed"

          # ═══════════════════════════════════════
          #  VERIFY: Check outputs
          # ═══════════════════════════════════════
          KERNEL_IMG="$OUT_DIR/arch/arm64/boot/Image"
          DTB_DIR="$OUT_DIR/arch/arm64/boot/dts/vendor/qcom"
          DTBO_IMG="$OUT_DIR/arch/arm64/boot/dtbo.img"

          if [ ! -f "$KERNEL_IMG" ]; then
            echo "❌ ERROR: Kernel Image not found at $KERNEL_IMG"
            exit 1
          fi
          echo "✅ Kernel Image: $(du -h "$KERNEL_IMG" | cut -f1)"

          # ═══════════════════════════════════════
          #  EXPORT: Pack into ZIP
          # ═══════════════════════════════════════
          echo "══════ Packing ZIP: $ZIP_NAME ══════"
          mkdir -p "$ZIP_DIR"

          # Copy kernel Image
          cp "$KERNEL_IMG" "$ZIP_DIR/"

          # Copy Image.gz if exists
          [ -f "${KERNEL_IMG}.gz" ] && cp "${KERNEL_IMG}.gz" "$ZIP_DIR/"

          # Merge & copy DTB files
          if [ -d "$DTB_DIR" ]; then
            find "$DTB_DIR" -name "*.dtb" -exec cat {} + > "$ZIP_DIR/dtb" 2>/dev/null || true
            echo "✅ DTB merged"
          fi

          # Copy DTBO image
          if [ -f "$DTBO_IMG" ]; then
            cp "$DTBO_IMG" "$ZIP_DIR/"
            echo "✅ DTBO copied"
          fi

          # Generate build info
          cat > "$ZIP_DIR/build_info.txt" << INFOEOF
          ═══════════════════════════════════════
           Kernel Build Information
          ═══════════════════════════════════════
           Device      : Xiaomi 11 Lite NE 5G (lisa)
           Defconfig   : ${DEFCONFIG}
           SukiSU      : Ultra
           Hook Method : ${HOOK_METHOD_INPUT}
           KPM Enabled : ${KPM_INPUT}
           LTO Disabled: ${LTO_INPUT}
           Build Date  : $(date -u '+%Y-%m-%d %H:%M UTC')
           Compiler    : $(clang --version | head -1)
          ═══════════════════════════════════════
          INFOEOF

          # Create ZIP archive
          cd "$ZIP_DIR"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" ./*
          echo "✅ ZIP exported: $GITHUB_WORKSPACE/$ZIP_NAME"
          echo "   Size: $(du -h "$GITHUB_WORKSPACE/$ZIP_NAME" | cut -f1)"

          # Export environment variables for next steps
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/$ZIP_NAME" >> "$GITHUB_ENV"
          BUILDEOF

          # ── Set env vars for build.sh and execute ──
          export DEFCONFIG_INPUT="${{ github.event.inputs.KERNEL_DEFCONFIG }}"
          export HOOK_METHOD_INPUT="${{ github.event.inputs.HOOK_METHOD }}"
          export KPM_INPUT="${{ github.event.inputs.ENABLE_KPM }}"
          export LTO_INPUT="${{ github.event.inputs.DISABLE_LTO }}"

          chmod +x build.sh
          bash build.sh

      # ════════════════════════════════════════════════════════
      # Step 9: Upload Kernel Artifact
      # ════════════════════════════════════════════════════════
      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 7
